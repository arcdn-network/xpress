<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/primeflex/3.3.1/primeflex.min.css" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/primeicons/6.0.1/primeicons.css" />
   <style>
      *,
      *::before,
      *::after {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
      }

      @font-face {
         font-family: 'Flexo-Regular';
         src: url('{{FONT}}') format('woff');
         font-weight: normal;
         font-style: normal;
      }

      body {
         font-family: 'Flexo-Regular', sans-serif;
         background-color: #002A8D;
         max-width: 480px;
         min-height: 100vh;
         margin: 0 auto;
         color: #202E44;
      }

      /* ── HEADER AZUL ── */
      .bcp-header {
         background-color: #002A8D;
         height: 6rem;
      }

      /* ── TARJETA BLANCA ── */
      .voucher {
         background: #fff;
         border-radius: 2rem 2rem 0 0;
         min-height: calc(100vh - 6rem);
         display: flex;
         flex-direction: column;
         padding: 0 2rem 2rem;
      }

      /* ── CÍRCULO NARANJA FLOTANTE ── */
      .check-circle-wrap {
         display: flex;
         justify-content: center;
         margin-top: -1.75rem;
         margin-bottom: 0.75rem;
      }

      .check-circle {
         width: 3.5rem;
         height: 3.5rem;
         background-color: #F57C00;
         border-radius: 50%;
         display: flex;
         align-items: center;
         justify-content: center;
      }

      .bcp-primary {
         color: #002A8D;
      }

      .bcp-gray {
         color: #606C7F;
      }

      .bcp-success {
         color: #F57C00;
      }

      .amount {
         font-size: 2.75rem;
         font-weight: 500;
         color: #002A8D;
      }

      .row {
         display: flex;
         justify-content: space-between;
         align-items: flex-start;
         padding: 0.75rem 0;
         border-bottom: 0.5px solid #E5E7EB;
      }

      .row .label {
         color: #1A1A2E;
         font-size: 0.9375rem;
      }

      .row .value {
         text-align: right;
         line-height: 1.6;
         font-size: 0.9375rem;
      }

      .bcp-button {
         background-color: #F57C00;
         color: #fff;
         border: none;
         border-radius: 2rem;
         padding: 0.875rem 0;
         font-size: 1rem;
         font-weight: 600;
         font-family: inherit;
         cursor: pointer;
         width: 80%;
      }

      .truncate {
         white-space: nowrap;
         overflow: hidden;
         text-overflow: ellipsis;
         max-width: 12.5rem;
      }
   </style>
</head>

<body>

   <!-- Banda azul superior -->
   <div class="bcp-header"></div>

   <div class="voucher">

      <!-- Círculo naranja flotante -->
      <div class="check-circle-wrap">
         <div class="check-circle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path d="M6 12.5L10 16.5L18 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"
                  stroke-linejoin="round" />
            </svg>
         </div>
      </div>

      <!-- Título + monto + fecha -->
      <div class="flex flex-column align-items-center text-center gap-2">
         <span class="font-semibold text-lg my-3">¡Operación exitosa!</span>
         <span class="amount">S/ {{MONTO}}</span>
         <span class="bcp-gray text-sm">{{FECHA}} - {{HORA}}</span>
      </div>

      <!-- Descargar / Compartir -->
      <div class="flex justify-content-center align-items-center gap-5 bcp-success font-bold mt-5 mb-4">
         <div class="flex align-items-center gap-2">
            <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M17 18C17.5523 18 18 18.4477 18 19C18 19.5523 17.5523 20 17 20H7C6.44772 20 6 19.5523 6 19C6 18.4477 6.44772 18 7 18H17ZM12 3C12.5523 3 13 3.44772 13 4V13.59L14.79 11.79C15.1805 11.4095 15.8095 11.4095 16.2 11.79C16.5805 12.1705 16.5805 12.7995 16.2 13.18L12.7 16.68C12.31 17.0677 11.69 17.0677 11.3 16.68L7.8 13.18C7.4195 12.7995 7.4195 12.1705 7.8 11.79C8.1905 11.4095 8.8095 11.4095 9.2 11.79L11 13.59V4C11 3.44772 11.4477 3 12 3Z"
                  fill="currentColor" />
            </svg>
            <span>Descargar</span>
         </div>
         <div class="flex align-items-center gap-2">
            <svg width="1.25rem" height="1.25rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
               <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M18 3C19.6569 3 21 4.34315 21 6C21 7.65685 19.6569 9 18 9C17.1913 9 16.4573 8.68001 15.9178 8.15974L8.97729 11.629C8.99228 11.7506 9 11.8744 9 12C9 12.2767 8.96253 12.5447 8.89238 12.7992L15.8952 15.8623C16.4368 15.329 17.18 15 18 15C19.6569 15 21 16.3431 21 18C21 19.6569 19.6569 21 18 21C16.3431 21 15 19.6569 15 18C15 17.8858 15.0064 17.773 15.0188 17.6621L7.70963 14.4655C7.22458 14.8025 6.63536 15 6 15C4.34315 15 3 13.6569 3 12C3 10.3431 4.34315 9 6 9C6.8087 9 7.54267 9.31999 8.08219 9.84026L15.0227 6.37098C15.0077 6.24942 15 6.12561 15 6C15 4.34315 16.3431 3 18 3ZM18 17C17.4477 17 17 17.4477 17 18C17 18.5523 17.4477 19 18 19C18.5523 19 19 18.5523 19 18C19 17.4477 18.5523 17 18 17ZM6 11C5.44772 11 5 11.4477 5 12C5 12.5523 5.44772 13 6 13C6.55228 13 7 12.5523 7 12C7 11.4477 6.55228 11 6 11ZM18 5C17.4477 5 17 5.44772 17 6C17 6.55228 17.4477 7 18 7C18.5523 7 19 6.55228 19 6C19 5.44772 18.5523 5 18 5Z"
                  fill="currentColor" />
            </svg>
            <span>Compartir</span>
         </div>
      </div>

      <!-- Filas de detalle -->
      <div>
         <div class="row">
            <span class="label">Enviado a</span>
            <div class="value">
               <div class="font-bold">{{NOMBRE}}</div>
               {{DIGITOS}}
               <div class="bcp-gray text-sm">{{DESTINO}}</div>
            </div>
         </div>
         <div class="row">
            <span class="label">Comisión</span>
            <div class="value font-bold">Gratis</div>
         </div>
         <div class="row">
            <span class="label">Desde</span>
            <div class="value">
               <div class="truncate font-bold">Cuenta Digital</div>
               <div class="bcp-gray text-sm">**** 1088</div>
            </div>
         </div>
         <div class="row">
            <span class="label">Número de operación</span>
            <div class="value font-bold">{{OPERACION}}</div>
         </div>
      </div>

      <!-- Banner Yape -->
      <div class="my-5">
         <img src="{{BANNER}}" class="w-full border-round-lg">
      </div>

      <!-- Botón -->
      <div class="flex justify-content-center mb-5">
         <button class="bcp-button" type="button">Yapear a otro celular</button>
      </div>

      <!-- Ir a Inicio -->
      <div class="flex justify-content-center">
         <span class="bcp-success font-bold">Ir a Inicio</span>
      </div>

   </div>

</body>

</html>
