<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeflex@3.3.1/primeflex.min.css" />
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" />
   <style>
      html,
      body {
         margin: 0;
         min-height: 100vh;
         font-family: 'Inter', Arial, sans-serif;
         background: #ffffff;
         max-width: 480px;
         margin: 0 auto;
         color: #1B1B1D;
      }

      .app {
         min-height: 100vh;
         display: flex;
         flex-direction: column;
         background: #f5f5f5;
      }

      .header {
         background: #00AFFE;
         color: white;
         padding: 3rem 1.5rem 4.5rem 2rem;
      }

      .card {
         background: #fff;
         margin-top: -3rem;
         border-top-left-radius: 1.8rem;
         border-top-right-radius: 1.8rem;
         letter-spacing: -1px;
         padding: 1.8rem;
         flex: 1;
      }

      .row {
         padding: 1rem 0;
         border-bottom: 1px solid #e5e7eb;
      }

      .btn {
         width: 100%;
         border: none;
         padding: 1.2rem;
         border-radius: 0.5rem;
         background: #00AFFE;
         color: white;
         font-size: 1rem;
      }

      .row span:first-child {
         font-size: 0.97rem;
         color: #9799A1;
      }

      .row span:last-child {
         font-size: 0.97rem;
         color: #4A4D53;
      }
   </style>
</head>

<body>

   <div class="app">

      <!-- HEADER -->
      <div class="header">

         <div class="flex justify-content-between align-items-center">

            <div class="text-4xl font-semibold">
               {{TITULO}}
            </div>

            <div>
               {{ICON}}
            </div>

         </div>

         <div class="flex justify-content-between mt-6">
            <div class="text-xl font-semibold">
               Monto total
            </div>

            <div class="text-xl font-bold mr-2">
               - S/ {{MONTO}}
            </div>
         </div>

      </div>

      <!-- CARD -->
      <div class="card flex flex-column">

         <div class="flex justify-content-between align-items-center mt-3 mb-2">
            <div class="font-semibold">
               Detalle de operación
            </div>

            <div class="flex align-items-center gap-2" style="color: #00AFFE;">
               <span>Compartir</span>
               <i class="pi pi-share-alt"></i>
            </div>
         </div>

         {{TITULAR}}

         {{CELULAR}}

         {{DESTINO}}

         {{MENSAJE}}

         <div class="row flex justify-content-between">
            <span>Fecha</span>
            <span>{{FECHA}}</span>
         </div>

         <div class="row flex justify-content-between">
            <span>Hora</span>
            <span>{{HORA}} hrs</span>
         </div>

         <div class="row flex justify-content-between">
            <span>Nro. de operación</span>
            <span>{{OPERACION}}</span>
         </div>

         <div class="flex-1"></div>

         <button class="btn mt-5">
            Ir a inicio
         </button>

      </div>

   </div>

</body>

</html>
