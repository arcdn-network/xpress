<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Yape - Confirmación de pago</title>
   <link href="https://cdn.jsdelivr.net/npm/primeflex@4.0.0/primeflex.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css" rel="stylesheet">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet">
   <style>
      :root {
         --yape-bg-start: #4a1972;
         --yape-bg-end: #742284;
         --yape-purple-dark: #863C95;
         --yape-purple-btn: #8C3D99;
         --yape-purple-card: #5C1C6A;
         --yape-text-title: #413559;
         --yape-text-name: #2E224A;
         --yape-text-meta: #67617B;
         --yape-text-label: #7B7388;
         --yape-text-data: #3E364E;
         --yape-teal: #06C7B1;
         --yape-divider: #efedf1;
         --yape-code-bg: #edecf2;
         --yape-code-text: #2b2144;
         --yape-badge-bg: #f5c035;
         --yape-badge-text: #1a1000;
      }

      body {
         margin: 0;
         padding: 0;
         -webkit-touch-callout: none;
         font-family: "Roboto", sans-serif;
      }

      .bg-yape-payment {
         background: linear-gradient(to bottom, var(--yape-bg-start) 0%, var(--yape-bg-end) 100%);
         user-select: none;
      }

      .border-botton {
         border-bottom: 1.5px solid var(--yape-divider);
      }

      .box-code {
         display: flex;
         justify-content: center;
         align-items: center;
         width: 25px;
         height: 25px;
         background-color: var(--yape-code-bg);
         color: var(--yape-code-text);
         border-radius: 5px;
         font-size: 1rem;
      }

      .text-uxs {
         font-size: 0.68rem !important;
      }

      .p-badge-warn {
         display: inline-block;
         background: var(--yape-badge-bg) !important;
         color: var(--yape-badge-text) !important;
         line-height: 10px !important;
      }

      .p-badge-xs {
         font-size: 10px !important;
         font-weight: 500 !important;
         border-radius: 4px !important;
      }
   </style>
</head>

<body>
   <div class="bg-yape-payment min-h-screen relative pt-5">
      <div class="pt-3">
         <div class="mx-2">
            <div class="flex justify-content-between">
               <div class="flex align-items-end">
                  <img width="75" src="https://cdn.jsdelivr.net/gh/arcdn-network/resource@main/logos/yape.png"
                     alt="Yape">
               </div>
               <div class="mr-2 mb-3 pb-4">
                  <div class="pointer border-circle flex justify-content-center align-items-center"
                     style="width: 38px; height: 38px; background-color: var(--yape-purple-btn);">
                     <i class="pi pi-times text-white"></i>
                  </div>
               </div>
            </div>
         </div>

         <div class="relative bg-white border-round-2xl p-3 m-3 mb-0">
            <div class="flex justify-content-between my-1">
               <div class="text-xl font-bold" style="color: var(--yape-purple-dark);">¡Yapeaste!</div>
               <div class="pointer flex align-items-center" style="color: var(--yape-teal);">
                  <i class="font-medium pi pi-share-alt mr-1"></i>
                  <div class="font-medium text-sm">Compartir</div>
               </div>
            </div>

            <div class="font-bold mb-1 flex align-items-start gap-1" style="color: var(--yape-text-title);">
               <span style="margin-top: 0.3rem;" class="text-4xl">S/</span>
               <span class="text-6xl">{{MONTO}}</span>
            </div>

            <div class="text-xl mb-2 pr-4 font-semibold" style="color: var(--yape-text-name);">{{NOMBRE}}</div>

            <div class="flex align-items-center text-sm font-medium" style="color: var(--yape-text-meta);">
               <div class="flex align-items-center gap-1">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                     <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M7 4a1 1 0 0 1 2 0v1h6V4a1 1 0 1 1 2 0v1h1a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H6a3 3 0 0 1-3-3V8a3 3 0 0 1 3-3h1zm11 3H6a1 1 0 0 0-.993.883L5 8v2h14V8a1 1 0 0 0-.883-.993zm1 5H5v6a1 1 0 0 0 .883.993L6 19h12a1 1 0 0 0 .993-.883L19 18z" />
                  </svg>
                  <span>{{FECHA}}</span>
               </div>
               <i class="pi pi-minus text-sm mx-2 rotate-90"></i>
               <div class="flex align-items-center gap-1">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                     <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M12 2c5.523 0 10 4.478 10 10s-4.477 10-10 10S2 17.522 2 12 6.477 2 12 2m0 2c-4.411 0-8 3.589-8 8s3.589 8 8 8 8-3.589 8-8-3.589-8-8-8m3 10h-3a1 1 0 0 1-1-1V8a1 1 0 1 1 2 0v4h2a1 1 0 1 1 0 2" />
                  </svg>
                  <span>{{HORA}}</span>
               </div>
            </div>

            <div class="border-botton mt-3"></div>

            <div class="flex align-items-center justify-content-between mt-2">
               <div class="flex align-items-center gap-2 text-uxs font-semibold"
                  style="color: var(--yape-text-label); letter-spacing: 0.5px;">
                  <span>CÓDIGO DE SEGURIDAD</span>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--yape-teal)">
                     <path fill-rule="evenodd" clip-rule="evenodd"
                        d="M4.929 19.07A10 10 0 0 0 12 22c5.522 0 10-4.477 10-10S17.522 2 12 2 2 6.478 2 12a10 10 0 0 0 2.929 7.07M13 8a1 1 0 1 1-2 0 1 1 0 0 1 2 0m-2 3a1 1 0 1 1 2 0v5a1 1 0 0 1-2 0z" />
                  </svg>
               </div>
               <div class="my-1 flex" style="gap: 5px;">
                  <div class="box-code"><span class="font-bold">{{D1}}</span></div>
                  <div class="box-code"><span class="font-bold">{{D2}}</span></div>
                  <div class="box-code"><span class="font-bold">{{D3}}</span></div>
               </div>
            </div>

            <div class="border-botton mt-2"></div>

            <div class="mt-3">
               <div class="text-uxs mb-3 font-semibold" style="color: var(--yape-text-label); letter-spacing: 0.5px;">
                  DATOS DE LA TRANSACCIÓN
               </div>
               <div style="color: var(--yape-text-data);">
                  <div class="flex justify-content-between text-sm mt-2">
                     <span>Nro. de celular</span>
                     <span class="font-medium">*** *** {{DIGITOS}}</span>
                  </div>
                  <div class="flex justify-content-between text-sm mt-2">
                     <span>Destino</span>
                     <span class="font-medium">Yape</span>
                  </div>
                  <div class="flex justify-content-between text-sm mt-2">
                     <span>Nro. de operación</span>
                     <span class="font-medium">{{OPERACION}}</span>
                  </div>
               </div>
            </div>
         </div>
      </div>

      <div class="p-3 pb-5">
         <div class="border-round-2xl" style="background-color: var(--yape-purple-card); padding: 0.8rem;">
            <div class="text-sm font-semibold text-white mb-2">
               <span class="mr-2">Más en Yape</span>
               <span class="p-badge p-badge-warn p-badge-xs px-2 py-1">Nuevo</span>
            </div>
            <div class="flex">
               <img width="100%" class="border-round-2xl"
                  src="https://res.cloudinary.com/dm0fujtre/image/upload/v1774043731/resources/banner/ehi5cadg7l8gyktx5vnu.webp"
                  draggable="false" alt="Promoción Yape">
            </div>
         </div>
      </div>
   </div>
</body>

</html>
