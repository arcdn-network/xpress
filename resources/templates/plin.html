<!DOCTYPE html>
<html lang="es">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/primeflex/3.3.1/primeflex.min.css" />
   <style>
      *,
      *::before,
      *::after {
         margin: 0;
         padding: 0;
         box-sizing: border-box;
      }

      html,
      body {
         width: 100%;
         height: 100%;
      }

      @font-face {
         font-family: "Geometria";
         src: url('{{FONT}}') format('truetype');
         font-weight: 400;
         font-style: normal;
      }

      body {
         font-family: "Geometria";
         display: flex;
         align-items: center;
         justify-content: center;
         min-height: 100vh;
         background-image: url('{{BACKGROUND}}');
         background-repeat: no-repeat;
         background-position: center center;
         background-size: contain;
         background-color: #fff;
      }

      .monto {
         position: absolute;
         top: calc(50% - 253px);
         transform: translateX(-50%);
         left: 50%;
         z-index: 99;
         color: #05BE50;
         display: flex;
         justify-content: center;
         align-items: center;
         font-weight: 600;
      }

      .wrapper {
         position: relative;
         display: inline-block;
         z-index: 99;
         height: 300px;
         width: 360px;
         padding: 0 0.5rem;
      }
   </style>
</head>

<body>
   <div class="monto">
      <span style="font-size: 1.4rem;">S/</span>
      <span style="font-size: 2.5rem;">{{MONTO}}</span>
   </div>

   <div class="wrapper" style="margin-left: 3px;">
      <div style="margin-top: 1rem; margin-bottom: 2rem;">
         {{NOMBRE}} <br>
         {{CELULAR}}{{DESTINO}}
      </div>

      <div>
         &nbsp;
      </div>

      <div style="margin-top: 2.4rem; margin-bottom: 1.8rem;">
         {{FECHA}}
      </div>

      <div style="margin-top: 2rem;">
         {{OPERACION}}
      </div>
   </div>
</body>

</html>
