<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Plin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset ─── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ─── Base ─── */
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #04BE4F;
      font-family: 'Inter', sans-serif;
      text-align: center;
    }

    /* ─── Ticket card ─── */
    .ticket-card {
      width: min(100%, 681px);
      aspect-ratio: 681 / 856;
      background: #04BE4F;
      padding: 70px 28px;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ─── Sección superior ─── */
    .ticket-top {
      background: #fff;
      border-radius: 14px 14px 0 0;
      flex: 1;
    }

    /* ─── Zona de corte ─── */
    .ticket-cut {
      height: 44px;
      flex-shrink: 0;
      background: #fff;
      display: flex;
      align-items: center;
      position: relative;
    }

    .ticket-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #04BE4F;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
    }

    .ticket-circle--left {
      left: -22px;
    }

    .ticket-circle--right {
      right: -22px;
    }

    .ticket-dashed-line {
      width: 100%;
      border-top: 6px dashed #2ecc40;
      z-index: 1;
    }

    /* ─── Sección inferior ─── */
    .ticket-bottom {
      background: #fff;
      border-radius: 0 0 14px 14px;
      height: 100px;
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      text-align: center;
    }

    .ticket-bottom-text {
      transform: translateY(-1rem);
    }

    .ticket-body {
      height: 100%;
    }

    /* ───────── Logos ───────── */
    .logo-bank {
      width: 15.5rem;
      max-width: 100%;
      height: auto;
      margin: 1.5rem 0;
    }

    .logo-plin {
      width: 5.5rem;
      height: auto;
      margin: 1rem 0;
    }

    .voucher-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      margin-top: 3rem;
    }

    /* ───────── Textos ───────── */
    .voucher-title {
      font-size: 1.7rem;
      font-weight: 400;
      color: #0D1414;
    }

    .voucher-name {
      font-size: 1.9rem;
      font-weight: 700;
      color: #000;
      line-height: 1;
      margin: 0.75rem 0 0.25rem;
    }

    .voucher-phone {
      font-size: 1.5rem;
      color: #0D1414;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .voucher-phone-dots {
      font-size: 0.8rem;
    }

    /* ───────── Monto ───────── */
    .voucher-amount-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .voucher-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 1rem 0 0.25rem;
    }

    .voucher-currency {
      font-size: 2.5rem;
      font-weight: 500;
      color: #003AB8;
      line-height: 1;
    }

    .voucher-amount {
      font-size: 5rem;
      font-weight: 500;
      color: #003AB8;
      line-height: 0.9;
      letter-spacing: -0.15rem;
    }

    .voucher-check {
      width: 3rem;
      height: 3rem;
      object-fit: contain;
      margin-left: 1.2rem;
      margin-top: 1rem;
    }

    /* ───────── Fecha ───────── */
    .voucher-date {
      font-size: 1.5rem;
      color: #9B9D9C;
      margin-top: -.3rem;
    }

    /* ───────── Código ───────── */
    .voucher-operation {
      margin-top: 2.2rem;
      font-size: 1.5rem;
      color: #222;
      font-weight: 400;
    }

    .voucher-operation span {
      font-weight: 400;
      color: #000;
    }
  </style>
</head>

<body>

  <div class="ticket-card">
    <div class="ticket-top">
      <div class="ticket-body">

        <!-- Logo banco -->
        <div class="voucher-logo">
          <img class="logo-bank" src="{{CDN_LOGO_BANK}}">
          <img class="logo-plin" src="{{CDN_LOGO_PLIN}}">
        </div>

        <!-- Texto -->
        <div class="voucher-title">
          ¡Plineaste!
        </div>

        <div class="voucher-name">
          {{NOMBRE}}
        </div>

        <div class="voucher-phone">
          {{CELULAR}}
          {{SEPARADOR}}
          {{DESTINO}}
        </div>

        <!-- Monto -->
        <div class="voucher-amount-wrapper">
          <div class="voucher-group">
            <span class="voucher-currency">S/</span>
            <span class="voucher-amount">{{MONTO}}</span>
          </div>
          <div class="voucher-check">
            <svg xmlns="http://www.w3.org/2000/svg" width="2.8rem" height="2.8rem" viewBox="0 0 24 24" fill="#58BA5F">
              <path
                d="M23.334 11.96c-.713-.726-.872-1.829-.393-2.727.342-.64.366-1.401.064-2.062-.301-.66-.893-1.142-1.601-1.302-.991-.225-1.722-1.067-1.803-2.081-.059-.723-.451-1.378-1.062-1.77-.609-.393-1.367-.478-2.05-.229-.956.347-2.026.032-2.642-.776-.44-.576-1.124-.915-1.85-.915-.725 0-1.409.339-1.849.915-.613.809-1.683 1.124-2.639.777-.682-.248-1.44-.163-2.05.229-.61.392-1.003 1.047-1.061 1.77-.082 1.014-.812 1.857-1.803 2.081-.708.16-1.3.642-1.601 1.302s-.277 1.422.065 2.061c.479.897.32 2.001-.392 2.727-.509.517-.747 1.242-.644 1.96s.536 1.347 1.17 1.7c.888.495 1.352 1.51 1.144 2.505-.147.71.044 1.448.519 1.996.476.549 1.18.844 1.902.798 1.016-.063 1.953.54 2.317 1.489.259.678.82 1.195 1.517 1.399.695.204 1.447.072 2.031-.357.819-.603 1.936-.603 2.754 0 .584.43 1.336.562 2.031.357.697-.204 1.258-.722 1.518-1.399.363-.949 1.301-1.553 2.316-1.489.724.046 1.427-.249 1.902-.798.475-.548.667-1.286.519-1.996-.207-.995.256-2.01 1.145-2.505.633-.354 1.065-.982 1.169-1.7s-.135-1.443-.643-1.96zM10.78 17.6 6.05 13l2.05-2.05 2.68 2.55 5.85-6 2.05 2.05-7.9 8.05z" />
            </svg>
          </div>
        </div>

        <!-- Fecha -->
        <div class="voucher-date">
          {{FECHA}} | {{HORA}}
        </div>

        <!-- Código -->
        <div class="voucher-operation">
          Código de operación:
          <span>{{OPERACION}}</span>
        </div>

      </div>
    </div>

    <div class="ticket-cut">
      <div class="ticket-circle ticket-circle--left"></div>
      <div class="ticket-dashed-line"></div>
      <div class="ticket-circle ticket-circle--right"></div>
    </div>

    <div class="ticket-bottom">
      <div class="ticket-bottom-text">
        Solo con Interbank paga a Plin, Yape
        <br />o cualquier billetera 100% desde Whatsapp
      </div>
    </div>

  </div>

</body>

</html>
