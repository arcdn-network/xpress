<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voucher BIM</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeflex@3.3.1/primeflex.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f4f4f4;
      font-family: "Roboto", sans-serif;
    }

    .btn-outline {
      border: 1.5px solid #554AA0;
      background: none;
      color: #554AA0;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      padding: 0.75rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow:
        0 1px 1px rgba(0, 0, 0, 0.04),
        0 2px 4px rgba(0, 0, 0, 0.08),
        0 6px 12px rgba(0, 0, 0, 0.14);
    }

    hr {
      border: none;
      border-top: 2px solid #eee;
    }

    .progress-bar-wrap {
      background: #fff;
      height: 0.3rem;
      position: relative;
    }

    .progress-bar-fill {
      background: #3FC0AB;
      height: 100%;
      margin-right: 4rem;
      border-radius: 1rem;
    }

    .progress-bar-logo {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
    }

    .card div>span:first-child {
      font-weight: 700;
      margin-right: 4px;
    }

    .card div>span:last-child {
      color: #8E8D8D;
    }

    .favoritos-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #e75480;
      font-size: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .link-volver {
      color: #554AA0;
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 2px;
      text-decoration-color: #554AA0;
    }
  </style>
</head>

<body>
  <div class="bg-white flex justify-content-center min-h-screen">
    <div class="w-full flex flex-column" style="max-width: 480px;">

      <!-- Header morado -->
      <div class="flex align-items-end justify-content-between h-6rem pb-3 mb-2" style="background: #554AA0;">
        <div class="flex align-items-center gap-1 mx-2">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 3L6 10L13 17" stroke="white" stroke-width="4" stroke-linecap="square" stroke-linejoin="miter"
              fill="none" />
          </svg>
          <img src="https://app.mibim.pe/images/bimNavLogo.png" alt="BIM" style="height: 26px;" />
        </div>
        <span class="text-white mr-3 font-medium">Mandar Plata</span>
        <div class="w-5rem h-1rem"></div>
      </div>

      <!-- Body -->
      <div class="flex-1 bg-white p-4">

        <div class="mb-5">
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill"></div>
            <div class="progress-bar-logo">
              <img src="https://app.mibim.pe/images/bimNavLogo.png" alt="" style="height: 18px;" aria-hidden="true" />
            </div>
          </div>
        </div>

        <!-- Bloque éxito -->
        <div class="card flex align-items-center gap-3 p-3 mb-4">
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="30" cy="30" r="27" stroke="#2EC4A9" stroke-width="5" fill="white" />
            <path d="M18 31 L26 39 L43 21" stroke="#2EC4A9" stroke-width="6" stroke-linecap="square"
              stroke-linejoin="miter" fill="none" />
          </svg>
          <div>
            <div class="mb-1 font-bold" style="color: #3F3F3F;">Operación Exitosa</div>
            <div class="mb-1 font-bold text-xl" style="color: #554AA0;">S/ {{MONTO}}</div>
            <div class="text-sm">Comisión: <span>S/ 0.00</span></div>
          </div>
        </div>

        <!-- Bloque detalle -->
        <div class="card p-3 mb-4">
          <div class="mb-2"><span>Cliente:</span><span>{{NOMBRE}}</span></div>
          <div class="mb-2"><span>Destino:</span><span>{{DESTINO}}</span></div>
          {{COMENTARIO}}
          {{CELULAR}}
          <hr class="my-2" />
          <div class="mb-2"><span>Fecha:</span><span>{{FECHA}}</span></div>
          <div class="mb-2"><span>Nro de operación:</span><span>{{OPERACION}}</span></div>
        </div>

        <!-- Favoritos -->
        <div class="flex justify-content-center mb-4">
          <button class="favoritos-btn">
            <svg width="30" height="30" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M30 8L35.5 22H50L38 31L43 45L30 36L17 45L22 31L10 22H24.5L30 8Z" stroke="#FF4F8B"
                stroke-width="4" fill="none" stroke-linejoin="miter" />
            </svg>
            <span class="font-semibold">Agregar a favoritos</span>
          </button>
        </div>

        <!-- Botones -->
        <div class="grid mb-4">
          <div class="col-6 pr-1">
            <button class="btn-outline w-full">Compartir</button>
          </div>
          <div class="col-6 pl-1">
            <button class="btn-outline w-full">Repetir operación</button>
          </div>
        </div>

        <!-- Volver -->
        <div class="text-center font-bold">
          <a href="#" class="link-volver">
            Volver a inicio ›
          </a>
        </div>

      </div>
    </div>
  </div>
</body>

</html>
